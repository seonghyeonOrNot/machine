
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,div,span{font-family:system-ui,sans-serif}
.wrap{padding:4px 0}
.row{display:flex;gap:16px;margin-bottom:20px}
.col{flex:1;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px 16px}
.col-title{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--color-text-primary)}
.teal{border-left:3px solid #0F6E56}
.coral{border-left:3px solid #993C1D}
canvas{display:block;width:100%}
.ctrl{display:flex;align-items:center;gap:8px;margin-top:14px}
.ctrl label{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.ctrl input{flex:1}
.stat-row{display:flex;gap:10px;margin-top:10px}
.stat{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:8px 10px;text-align:center}
.stat-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px}
.stat-val{font-size:16px;font-weight:600;font-family:monospace;color:var(--color-text-primary)}
.note{font-size:12px;color:var(--color-text-tertiary);margin-top:12px;line-height:1.6;text-align:center}
.progress-wrap{margin-top:10px}
.progress-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.progress-bg{background:var(--color-border-tertiary);border-radius:4px;height:12px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width 0.3s}
.btn{padding:7px 20px;border-radius:8px;border:0.5px solid var(--color-border-secondary);font-size:13px;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);font-family:inherit;margin-right:8px}
.btn-play{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
</style>

<div class="wrap">
  <div class="row">
    <div class="col teal">
      <div class="col-title" style="color:#0F6E56">좁은 피치 (촘촘)</div>
      <canvas id="cv-tight" height="160"></canvas>
      <div class="stat-row">
        <div class="stat"><div class="stat-label">피치</div><div class="stat-val" id="tight-pitch">1mm</div></div>
        <div class="stat"><div class="stat-label">회전수</div><div class="stat-val" id="tight-rot">0.0 회</div></div>
        <div class="stat"><div class="stat-label">전진 거리</div><div class="stat-val" id="tight-adv" style="color:#0F6E56">0.0mm</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">전진 거리</div>
        <div class="progress-bg"><div class="progress-bar" id="tight-bar" style="background:#0F6E56;width:0%"></div></div>
      </div>
    </div>
    <div class="col coral">
      <div class="col-title" style="color:#993C1D">넓은 피치 (성김)</div>
      <canvas id="cv-wide" height="160"></canvas>
      <div class="stat-row">
        <div class="stat"><div class="stat-label">피치</div><div class="stat-val" id="wide-pitch">4mm</div></div>
        <div class="stat"><div class="stat-label">회전수</div><div class="stat-val" id="wide-rot">0.0 회</div></div>
        <div class="stat"><div class="stat-label">전진 거리</div><div class="stat-val" id="wide-adv" style="color:#993C1D">0.0mm</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">전진 거리</div>
        <div class="progress-bg"><div class="progress-bar" id="wide-bar" style="background:#993C1D;width:0%"></div></div>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶ 회전 시작</button>
    <button class="btn" onclick="resetAnim()">↺ 초기화</button>
    <div class="ctrl" style="flex:1;min-width:160px">
      <label>속도</label>
      <input type="range" min="0.5" max="3" step="0.5" value="1" id="speed">
    </div>
  </div>

  <p class="note" id="note-txt">▶ 버튼을 누르면 두 나사가 동시에 회전합니다. 같은 회전수인데 전진 거리가 다른 것을 확인하세요.</p>
</div>

<script>
const TIGHT_PITCH = 1;
const WIDE_PITCH  = 4;
const MAX_ADV     = 12;

let angle = 0;
let playing = false;
let raf = null;
let last = null;

function isDark(){ return matchMedia('(prefers-color-scheme:dark)').matches; }

function drawScrew(canvasId, pitch, angle, color){
  const cv = document.getElementById(canvasId);
  const W = cv.offsetWidth || 260;
  cv.width = W; cv.height = 160;
  const ctx = cv.getContext('2d');
  const dark = isDark();
  const bodyCol  = dark ? '#2a2a27' : '#f0efe9';
  const wireCol  = dark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.25)';
  const textCol  = dark ? '#9c9a92' : '#888780';

  ctx.clearRect(0,0,W,160);

  const cx = W/2, cy = 80;
  const r = 28;
  const threadSpacing = pitch * 14;
  const maxThreads = Math.floor(130 / threadSpacing) + 2;

  ctx.fillStyle = bodyCol;
  ctx.strokeStyle = wireCol;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(cx - r, 15, r*2, 130, 4);
  ctx.fill(); ctx.stroke();

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  const offset = (angle % (Math.PI*2)) / (Math.PI*2) * threadSpacing;
  for(let i = -2; i <= maxThreads + 2; i++){
    const y = 15 + i * threadSpacing - offset;
    if(y < 10 || y > 150) continue;
    const perspective = Math.sin(i * 0.4 + angle) * 4;
    ctx.beginPath();
    ctx.moveTo(cx - r - 8, y + perspective);
    ctx.lineTo(cx + r + 8, y - perspective);
    ctx.stroke();
  }

  ctx.strokeStyle = wireCol;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(cx - r, 15, r*2, 130, 4);
  ctx.stroke();

  const rotDeg = ((angle / (Math.PI*2)) % 1 * 360).toFixed(0);
  ctx.fillStyle = color;
  ctx.font = '500 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(rotDeg + '°', cx, 155);
}

function step(ts){
  if(!last) last = ts;
  const dt = (ts - last) / 1000;
  last = ts;
  const speed = +document.getElementById('speed').value;
  angle += dt * speed * Math.PI;

  const rotations = angle / (Math.PI * 2);
  const tAdv = Math.min(rotations * TIGHT_PITCH, MAX_ADV);
  const wAdv = Math.min(rotations * WIDE_PITCH,  MAX_ADV);

  drawScrew('cv-tight', TIGHT_PITCH, angle, '#0F6E56');
  drawScrew('cv-wide',  WIDE_PITCH,  angle, '#993C1D');

  document.getElementById('tight-rot').textContent = rotations.toFixed(1) + ' 회';
  document.getElementById('wide-rot').textContent  = rotations.toFixed(1) + ' 회';
  document.getElementById('tight-adv').textContent = tAdv.toFixed(1) + 'mm';
  document.getElementById('wide-adv').textContent  = wAdv.toFixed(1) + 'mm';
  document.getElementById('tight-bar').style.width = (tAdv / MAX_ADV * 100) + '%';
  document.getElementById('wide-bar').style.width  = (wAdv / MAX_ADV * 100) + '%';

  const note = document.getElementById('note-txt');
  if(wAdv >= MAX_ADV){
    note.textContent = `넓은 피치가 먼저 ${MAX_ADV}mm 전진 완료! 같은 회전수(${rotations.toFixed(1)}회)인데 좁은 피치는 ${tAdv.toFixed(1)}mm만 전진했습니다.`;
    note.style.color = '#993C1D';
    stop();
    return;
  }

  if(rotations > 0.5)
    note.textContent = `${rotations.toFixed(1)}번 회전 — 좁은 피치 ${tAdv.toFixed(1)}mm vs 넓은 피치 ${wAdv.toFixed(1)}mm. 같은 회전수인데 ${(wAdv/Math.max(tAdv,0.01)).toFixed(1)}배 차이!`;

  raf = requestAnimationFrame(step);
}

function stop(){
  playing = false;
  if(raf){ cancelAnimationFrame(raf); raf = null; }
  last = null;
  document.getElementById('btn-play').textContent = '▶ 회전 시작';
  document.getElementById('btn-play').className = 'btn btn-play';
}

function togglePlay(){
  if(playing){ stop(); }
  else {
    playing = true;
    document.getElementById('btn-play').textContent = '⏸ 일시정지';
    document.getElementById('note-txt').style.color = '';
    raf = requestAnimationFrame(step);
  }
}

function resetAnim(){
  stop();
  angle = 0;
  drawScrew('cv-tight', TIGHT_PITCH, 0, '#0F6E56');
  drawScrew('cv-wide',  WIDE_PITCH,  0, '#993C1D');
  document.getElementById('tight-rot').textContent = '0.0 회';
  document.getElementById('wide-rot').textContent  = '0.0 회';
  document.getElementById('tight-adv').textContent = '0.0mm';
  document.getElementById('wide-adv').textContent  = '0.0mm';
  document.getElementById('tight-bar').style.width = '0%';
  document.getElementById('wide-bar').style.width  = '0%';
  document.getElementById('note-txt').textContent = '▶ 버튼을 누르면 두 나사가 동시에 회전합니다. 같은 회전수인데 전진 거리가 다른 것을 확인하세요.';
  document.getElementById('note-txt').style.color = '';
}

drawScrew('cv-tight', TIGHT_PITCH, 0, '#0F6E56');
drawScrew('cv-wide',  WIDE_PITCH,  0, '#993C1D');
</script>
