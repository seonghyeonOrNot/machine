<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나사 피치 비교</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f6f2;--surface:#ffffff;--surface2:#f0efe9;
    --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
    --text:#1a1a18;--text2:#5f5e5a;--text3:#9c9a92;
    --blue:#185fa5;--blue-bg:#e6f1fb;
    --radius:10px;--radius-sm:6px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#181816;--surface:#222220;--surface2:#2a2a27;
      --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
      --text:#e8e6de;--text2:#9c9a92;--text3:#5f5e5a;
      --blue:#85b7eb;--blue-bg:#0c2a45;
    }
  }
  body{font-family:'Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:24px 20px;max-width:680px;margin:0 auto;min-height:100vh}
  h1{font-size:20px;font-weight:600;margin-bottom:3px}
  .sub{font-size:13px;color:var(--text2);margin-bottom:20px}

  .row{display:flex;gap:14px;margin-bottom:16px}
  .col{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .col.teal{border-left:3px solid #0F6E56}
  .col.coral{border-left:3px solid #993C1D}
  .col-title{font-size:13px;font-weight:600;margin-bottom:10px}

  canvas{display:block;width:100%}

  .stat-row{display:flex;gap:8px;margin-top:10px}
  .stat{flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
  .stat-label{font-size:11px;color:var(--text3);margin-bottom:2px}
  .stat-val{font-size:15px;font-weight:700;font-family:'Courier New',monospace;color:var(--text)}

  .progress-wrap{margin-top:10px}
  .progress-label{font-size:11px;color:var(--text2);margin-bottom:4px}
  .progress-bg{background:var(--surface2);border-radius:4px;height:12px;overflow:hidden}
  .progress-bar{height:100%;border-radius:4px;transition:width 0.1s}

  .controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .btn{padding:7px 20px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:13px;cursor:pointer;background:var(--surface2);color:var(--text2);font-family:inherit;transition:all 0.15s}
  .btn:hover{background:var(--surface);color:var(--text)}
  .btn-play{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);font-weight:600}
  .ctrl{display:flex;align-items:center;gap:8px;flex:1;min-width:140px}
  .ctrl label{font-size:12px;color:var(--text2);white-space:nowrap}
  .ctrl input[type=range]{flex:1;height:4px;appearance:none;-webkit-appearance:none;background:var(--surface2);border-radius:2px;outline:none;cursor:pointer}
  .ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid var(--surface)}
  .ctrl input[type=range]::-moz-range-thumb{width:14px;height:14px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid var(--surface)}

  .note{font-size:12px;color:var(--text3);line-height:1.6;text-align:center;padding:10px;background:var(--surface2);border-radius:var(--radius-sm)}
</style>
</head>
<body>

<h1>나사 피치 비교</h1>
<p class="sub">같은 횟수로 회전할 때 전진 거리가 어떻게 다른지 확인해보세요</p>

<div class="row">
  <div class="col teal">
    <div class="col-title" style="color:#0F6E56">좁은 피치 (촘촘) — 1mm</div>
    <canvas id="cv-tight" height="160"></canvas>
    <div class="stat-row">
      <div class="stat"><div class="stat-label">회전수</div><div class="stat-val" id="tight-rot">0.0 회</div></div>
      <div class="stat"><div class="stat-label">전진 거리</div><div class="stat-val" id="tight-adv" style="color:#0F6E56">0.0mm</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">전진 거리</div>
      <div class="progress-bg"><div class="progress-bar" id="tight-bar" style="background:#0F6E56;width:0%"></div></div>
    </div>
  </div>
  <div class="col coral">
    <div class="col-title" style="color:#993C1D">넓은 피치 (성김) — 4mm</div>
    <canvas id="cv-wide" height="160"></canvas>
    <div class="stat-row">
      <div class="stat"><div class="stat-label">회전수</div><div class="stat-val" id="wide-rot">0.0 회</div></div>
      <div class="stat"><div class="stat-label">전진 거리</div><div class="stat-val" id="wide-adv" style="color:#993C1D">0.0mm</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">전진 거리</div>
      <div class="progress-bg"><div class="progress-bar" id="wide-bar" style="background:#993C1D;width:0%"></div></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶ 회전 시작</button>
  <button class="btn" onclick="resetAnim()">↺ 초기화</button>
  <div class="ctrl">
    <label>속도</label>
    <input type="range" min="0.5" max="3" step="0.5" value="1" id="speed">
  </div>
</div>

<p class="note" id="note-txt">▶ 버튼을 누르면 두 나사가 동시에 회전합니다. 같은 회전수인데 전진 거리가 다른 것을 확인하세요.</p>

<script>
const TIGHT_PITCH = 1;
const WIDE_PITCH  = 4;
const MAX_ADV     = 12;

let angle   = 0;
let playing = false;
let raf     = null;
let last    = null;

function isDark(){ return matchMedia('(prefers-color-scheme:dark)').matches; }

function drawScrew(canvasId, pitch, angle, color){
  const cv = document.getElementById(canvasId);
  const W  = cv.parentElement.clientWidth - 32 || 260;
  cv.width = W; cv.height = 160;
  const ctx = cv.getContext('2d');
  const dark = isDark();
  const bodyCol = dark ? '#2a2a27' : '#f0efe9';
  const wireCol = dark ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.22)';

  ctx.clearRect(0,0,W,160);

  const cx = W/2, r = Math.min(W*0.22, 32);
  const threadSpacing = pitch * 14;
  const maxThreads = Math.floor(130/threadSpacing) + 2;

  ctx.fillStyle = bodyCol;
  ctx.strokeStyle = wireCol;
  ctx.lineWidth = 1;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(cx-r, 15, r*2, 130, 4);
  else { ctx.rect(cx-r, 15, r*2, 130); }
  ctx.fill(); ctx.stroke();

  const offset = (angle % (Math.PI*2)) / (Math.PI*2) * threadSpacing;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  for(let i=-2; i<=maxThreads+2; i++){
    const y = 15 + i*threadSpacing - offset;
    if(y < 10 || y > 150) continue;
    const persp = Math.sin(i*0.4 + angle) * 4;
    ctx.beginPath();
    ctx.moveTo(cx-r-8, y+persp);
    ctx.lineTo(cx+r+8, y-persp);
    ctx.stroke();
  }

  ctx.strokeStyle = wireCol;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(cx-r, 15, r*2, 130, 4);
  else ctx.rect(cx-r, 15, r*2, 130);
  ctx.stroke();

  const rotDeg = Math.round((angle/(Math.PI*2)) % 1 * 360);
  ctx.fillStyle = color;
  ctx.font = '500 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(rotDeg + '°', cx, 155);
}

function step(ts){
  if(!last) last = ts;
  const dt = (ts-last)/1000;
  last = ts;
  const speed = +document.getElementById('speed').value;
  angle += dt * speed * Math.PI;

  const rot  = angle/(Math.PI*2);
  const tAdv = Math.min(rot*TIGHT_PITCH, MAX_ADV);
  const wAdv = Math.min(rot*WIDE_PITCH,  MAX_ADV);

  drawScrew('cv-tight', TIGHT_PITCH, angle, '#0F6E56');
  drawScrew('cv-wide',  WIDE_PITCH,  angle, '#993C1D');

  document.getElementById('tight-rot').textContent = rot.toFixed(1)+' 회';
  document.getElementById('wide-rot').textContent  = rot.toFixed(1)+' 회';
  document.getElementById('tight-adv').textContent = tAdv.toFixed(1)+'mm';
  document.getElementById('wide-adv').textContent  = wAdv.toFixed(1)+'mm';
  document.getElementById('tight-bar').style.width = (tAdv/MAX_ADV*100)+'%';
  document.getElementById('wide-bar').style.width  = (wAdv/MAX_ADV*100)+'%';

  const note = document.getElementById('note-txt');
  if(wAdv >= MAX_ADV){
    note.textContent = `넓은 피치가 먼저 ${MAX_ADV}mm 전진 완료! 같은 회전수(${rot.toFixed(1)}회)인데 좁은 피치는 ${tAdv.toFixed(1)}mm만 전진했습니다.`;
    note.style.color = '#993C1D';
    stop(); return;
  }
  if(rot > 0.5)
    note.textContent = `${rot.toFixed(1)}번 회전 — 좁은 피치 ${tAdv.toFixed(1)}mm vs 넓은 피치 ${wAdv.toFixed(1)}mm. 같은 회전수인데 ${(wAdv/Math.max(tAdv,0.01)).toFixed(1)}배 차이!`;

  raf = requestAnimationFrame(step);
}

function stop(){
  playing = false;
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  last = null;
  document.getElementById('btn-play').textContent = '▶ 회전 시작';
}

function togglePlay(){
  if(playing){ stop(); }
  else{
    playing = true;
    document.getElementById('btn-play').textContent = '⏸ 일시정지';
    document.getElementById('note-txt').style.color = '';
    raf = requestAnimationFrame(step);
  }
}

function resetAnim(){
  stop();
  angle = 0;
  drawScrew('cv-tight', TIGHT_PITCH, 0, '#0F6E56');
  drawScrew('cv-wide',  WIDE_PITCH,  0, '#993C1D');
  ['tight-rot','wide-rot'].forEach(id=>document.getElementById(id).textContent='0.0 회');
  ['tight-adv','wide-adv'].forEach(id=>document.getElementById(id).textContent='0.0mm');
  ['tight-bar','wide-bar'].forEach(id=>document.getElementById(id).style.width='0%');
  const note = document.getElementById('note-txt');
  note.textContent = '▶ 버튼을 누르면 두 나사가 동시에 회전합니다. 같은 회전수인데 전진 거리가 다른 것을 확인하세요.';
  note.style.color = '';
}

drawScrew('cv-tight', TIGHT_PITCH, 0, '#0F6E56');
drawScrew('cv-wide',  WIDE_PITCH,  0, '#993C1D');
</script>
</body>
</html>
